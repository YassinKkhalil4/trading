services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uvicorn trading_system.app.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
    ports:
      - "8501:8501"
    command: streamlit run trading_system/dashboard/app.py --server.address 0.0.0.0 --server.port 8501

  scheduler-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
      - redis
    command: python -m trading_system.app.services.worker scheduler

  market-stream-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
      - redis
    command: python -m trading_system.app.services.worker market-stream

  reconciliation-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
    command: python -m trading_system.app.services.worker reconciliation

  trade-monitor-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
    command: python -m trading_system.app.services.worker trade-monitor

  review-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
    command: python -m trading_system.app.services.worker review

  learning-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
    command: python -m trading_system.app.services.worker learning

volumes:
  postgres_data:
