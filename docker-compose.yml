services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      REDIS_URL: redis://redis:6379/0
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: uvicorn trading_system.app.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      REDIS_URL: redis://redis:6379/0
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
      - redis
    ports:
      - "8501:8501"
    command: streamlit run trading_system/dashboard/app.py --server.address 0.0.0.0 --server.port 8501

  celery-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      REDIS_URL: redis://redis:6379/0
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
      - redis
    command: celery -A trading_system.app.tasks worker --loglevel=info -Q market_data,execution,analytics

  celery-beat:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://trading:trading@postgres:5432/trading_system
      REDIS_URL: redis://redis:6379/0
      DEPLOYMENT_TARGET: docker
    depends_on:
      - postgres
      - redis
    command: celery -A trading_system.app.tasks beat --loglevel=info

volumes:
  postgres_data:
